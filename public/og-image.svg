<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#10b981" opacity="0.1"/>
  <circle cx="1100" cy="530" r="250" fill="#10b981" opacity="0.1"/>
  
  <!-- Book icon -->
  <g transform="translate(200, 315)">
    <circle r="120" fill="url(#bookGrad)"/>
    <g transform="translate(0, 15) scale(0.5)">
      <path d="M-120 -80 C-120 -100, -100 -120, -20 -120 L-20 80 C-100 80, -120 60, -120 40 Z" fill="white" opacity="0.95"/>
      <path d="M120 -80 C120 -100, 100 -120, 20 -120 L20 80 C100 80, 120 60, 120 40 Z" fill="white" opacity="0.9"/>
      <path d="M-20 -120 L-20 80 L0 90 L20 80 L20 -120 L0 -130 Z" fill="white" opacity="0.85"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="380" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold" fill="#111827">Elise Reads</text>
  <text x="380" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#6b7280">Track your reading journey</text>
  <text x="380" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#6b7280">Discover new books</text>
  <text x="380" y="470" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="#6b7280">Share your reviews</text>
  
  <!-- Sparkles -->
  <circle cx="950" cy="200" r="8" fill="#10b981"/>
  <circle cx="1000" cy="250" r="5" fill="#10b981" opacity="0.7"/>
  <circle cx="920" cy="280" r="6" fill="#10b981" opacity="0.5"/>
</svg>
