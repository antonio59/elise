version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "antonio59"
    labels:
      - "dependencies"
    groups:
      minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # @convex-dev/auth@0.0.91 requires @auth/core@^0.37.0 — cannot bump past 0.37.x
      - dependency-name: "@auth/core"
        versions: [">=0.38.0"]
      # eslint-plugin-react-hooks@7.0.1 peer dep only covers eslint ^9.0.0
      - dependency-name: "eslint"
        versions: [">=10.0.0"]
      - dependency-name: "@eslint/js"
        versions: [">=10.0.0"]
      # typescript-eslint@8.x requires typescript <6.0.0
      - dependency-name: "typescript"
        versions: [">=6.0.0"]
