name: Fallow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fallow:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fallow (dead code check)
        run: npx fallow
        # Fallow exits non-zero for warnings in CI. Dead-code issues are
        # surfaced in output; CI should not block on complexity/duplication.
        continue-on-error: true
