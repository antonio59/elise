name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, MIT-0, Apache-2.0, BSD-3-Clause, BSD-2-Clause, ISC, CC-BY-4.0, BlueOak-1.0.0, 0BSD
