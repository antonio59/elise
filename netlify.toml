[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # VITE_CONVEX_URL is set per deploy context in the Netlify dashboard
  # (Production → agile-shrimp-456.convex.cloud, Preview → staging URL)

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
